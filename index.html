<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #333;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        main {
            padding: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 15px;
            border: none;
            background: #007BFF;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<header>
    <h1>Test Web Page</h1>
</header>

<main>
    <div class="card">
        <h2> Location </h2>
        <iframe 
            src="https://www.openstreetmap.org/export/embed.html?bbox=106.9%2C-6.4%2C107.4%2C-6.1&amp;layer=cyclemap&amp;marker=-6.2563%2C107.1476"
            width="100%"
            height="400"
            style="border:0;"
            loading="lazy"
            > 
        </iframe>
    </div>
    <div id="map" style="height:400px;"></div>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    
    <script>
      var map = L.map('map').setView([-6.2563, 107.1476], 12);
    
      L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
        maxZoom: 17,
        attribution: '© OpenTopoMap contributors'
      }).addTo(map);
    
      L.marker([-6.2563, 107.1476]).addTo(map);
    </script>
    
    <div class="card">
        <h2>Welcome</h2>
        <p>This is a simple HTML page for testing layout and styles.</p>
        <button onclick="showMessage()">Click Me</button>
    </div>

    <div class="card">
        <h2>Form Test</h2>
        <form>
            <label>Name:</label><br>
            <input type="text" placeholder="Enter your name"><br><br>
            <label>Email:</label><br>
            <input type="email" placeholder="Enter your email"><br><br>
            <button type="submit">Submit</button>
        </form>
    </div>
</main>

<script>
    function showMessage() {
        alert("Button clicked!");
    }
</script>

</body>
</html>
